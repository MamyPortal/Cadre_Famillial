<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Cadre familial pour tablette" />
  <title>Cadre familial</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="shell" id="appShell">
    <header class="header card">
      <div class="header-title">
        <p id="subtitle" class="eyebrow">Cadre familial</p>
        <h1 id="title">Bonjour</h1>
        <p id="familyNotes" class="small muted">Chargement...</p>
      </div>
      <div class="header-meta">
        <div id="dateLine" class="date-line">--</div>
        <div id="timeLine" class="time-line">--:--</div>
        <div id="weatherBadge" class="weather-badge">--</div>
      </div>
    </header>

    <aside class="sidebar">
      <section class="card message-card panel">
        <div class="panel-title">Message de la famille</div>
        <div id="messageBox" class="message-box">--</div>
      </section>

      <section class="actions card panel">
        <a id="whatsappLink" class="cta" href="#" rel="noopener noreferrer">WhatsApp</a>
        <button id="refreshBtn" class="secondary" type="button">Rafraîchir</button>
        <a id="settingsLink" class="secondary" href="settings.html">Paramètres</a>
        <a id="photoLink" class="secondary" href="#" rel="noopener noreferrer">Photos</a>
      </section>

      <section class="card links-card panel">
        <div class="panel-title">Liens de la famille</div>
        <div id="linkList" class="link-list"></div>
      </section>

      <section class="card status-card panel">
        <div class="panel-title">État</div>
        <div class="status-grid">
          <div>
            <span class="status-label">Connexion</span>
            <span id="networkLine" class="status-value">--</span>
          </div>
          <div>
            <span class="status-label">Batterie</span>
            <span id="batteryLine" class="status-value">--</span>
          </div>
          <div>
            <span class="status-label">Ville</span>
            <span id="cityLine" class="status-value">--</span>
          </div>
        </div>
      </section>
    </aside>

    <section class="card photo-card">
      <div class="photo-stage">
        <img id="photoImg" alt="Photos de la famille" />
        <div id="photoLabel" class="photo-label">--</div>
      </div>
    </section>

    <footer class="footer card">
      <span>Cadre familial • Redmi Pad 2</span>
      <button id="fullscreenBtn" class="footer-action" type="button">Plein écran</button>
    </footer>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/slideshow.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
